<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareerAI — Beat the Algorithm</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#fffbf5;color:#1a1a1a;min-height:100vh;}

/* ── Hero ── */
.hero{position:relative;min-height:540px;display:flex;align-items:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=1400&q=80&fit=crop');background-size:cover;background-position:center 20%;z-index:0;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right, rgba(255,140,50,0.92) 35%, rgba(255,160,60,0.75) 55%, rgba(255,180,80,0.3) 80%, transparent 100%);z-index:1;}
.hero-content{position:relative;z-index:2;max-width:820px;margin:0 auto;padding:90px 32px;width:100%;}
.badge{display:inline-block;border:1px solid rgba(255,255,255,0.5);color:#fff;font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:22px;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,5vw,3.7rem);font-weight:900;line-height:1.1;color:#fff;margin-bottom:16px;text-shadow:0 2px 20px rgba(200,80,0,0.3);}
h1 span{color:#fff3c4;}
.subtitle{font-size:1.05rem;color:rgba(255,255,255,0.88);font-weight:300;max-width:420px;line-height:1.75;margin-bottom:26px;}
.price-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.price-tag{display:inline-flex;align-items:center;gap:6px;font-size:0.9rem;color:#fff;background:rgba(255,255,255,0.2);padding:6px 16px;border-radius:100px;border:1px solid rgba(255,255,255,0.35);backdrop-filter:blur(10px);}
.price-tag strong{color:#fff3c4;font-size:1.1rem;}
.feature-pills{display:flex;flex-wrap:wrap;gap:8px;}
.feature-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.4);border-radius:100px;padding:5px 12px;font-size:0.75rem;color:#fff;font-weight:500;backdrop-filter:blur(10px);}

/* ── Stats strip ── */
.stats-strip{background:linear-gradient(135deg,#ff8c32 0%,#ff6b6b 50%,#ffa94d 100%);padding:32px 24px;}
.stats-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:24px;}
.stat-item{text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:#fff;line-height:1;}
.stat-label{font-size:0.75rem;color:rgba(255,255,255,0.8);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.stat-div{width:1px;height:40px;background:rgba(255,255,255,0.3);}

/* ── Main ── */
.main-wrap{
  background:linear-gradient(180deg, #fff8ee 0%, #fffbf5 40%, #fff8f0 100%);
  position:relative;
  overflow:hidden;
}
.main-wrap::before{
  content:'';
  position:absolute;
  top:-120px; right:-120px;
  width:500px; height:500px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,160,60,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.main-wrap::after{
  content:'';
  position:absolute;
  bottom:-80px; left:-80px;
  width:400px; height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
  pointer-events:none;
}
.side-img-left{
  position:absolute;
  left:0; top:0; bottom:0;
  width:260px;
  background-image:url('https://images.unsplash.com/photo-1556761175-4b46a572b786?w=700&q=80&fit=crop');
  background-size:cover;
  background-position:center top;
  opacity:0.35;
  z-index:0;
  mask-image:linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
}
.side-img-right{
  position:absolute;
  right:0; top:0; bottom:0;
  width:260px;
  background-image:url('https://images.unsplash.com/photo-1560250097-0b93528c311a?w=700&q=80&fit=crop');
  background-size:cover;
  background-position:center top;
  opacity:0.35;
  z-index:0;
  mask-image:linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%);
}

.main{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:48px 24px 80px;}

/* Section title above cards */
.section-intro{text-align:center;margin-bottom:32px;}
.section-intro h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.section-intro p{font-size:0.95rem;color:#666;font-weight:300;}

/* Cards */
.card{background:#fff;border:1px solid rgba(255,140,50,0.15);border-radius:20px;padding:28px;margin-bottom:16px;box-shadow:0 4px 24px rgba(255,120,40,0.08);}
.card-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#ff8c32;font-weight:500;margin-bottom:14px;}
.tabs{display:flex;gap:4px;background:rgba(255,140,50,0.07);border-radius:10px;padding:4px;margin-bottom:16px;}
.tab{flex:1;padding:9px 12px;background:transparent;border:none;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:rgba(26,26,26,0.4);transition:all 0.2s;}
.tab.active{background:#fff;color:#ff8c32;font-weight:500;box-shadow:0 1px 6px rgba(255,140,50,0.15);}
.tab:hover:not(.active){color:rgba(26,26,26,0.65);}
textarea{width:100%;background:#fffaf5;border:1px solid rgba(255,140,50,0.2);border-radius:10px;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:0.93rem;font-weight:300;line-height:1.7;padding:14px 16px;resize:vertical;transition:border-color 0.2s;outline:none;}
textarea:focus{border-color:#ff8c32;background:#fff;}
textarea::placeholder{color:rgba(26,26,26,0.25);}
.dropzone{border:2px dashed rgba(255,140,50,0.3);border-radius:12px;padding:36px 24px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fffaf5;}
.dropzone:hover{border-color:#ff8c32;background:rgba(255,140,50,0.04);}
.drop-icon{font-size:1.8rem;margin-bottom:10px;}
.drop-title{font-size:0.92rem;color:rgba(26,26,26,0.6);margin-bottom:5px;}
.drop-sub{font-size:0.78rem;color:rgba(26,26,26,0.35);}
.file-chip{display:inline-flex;align-items:center;gap:10px;background:rgba(255,140,50,0.08);border:1px solid rgba(255,140,50,0.25);border-radius:8px;padding:10px 16px;font-size:0.86rem;color:#ff8c32;margin-top:4px;}
.file-chip button{background:none;border:none;cursor:pointer;color:rgba(255,140,50,0.5);font-size:1rem;padding:0;line-height:1;}


/* ── Button System ── */

/* Base — shared by all buttons */
.btn-base{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;text-decoration:none;}
.btn-base:disabled{opacity:0.38;cursor:not-allowed;transform:none !important;box-shadow:none !important;}

/* Primary — main action, rich red, full width */
.btn{width:100%;padding:18px 24px;background:#e8192c;color:#fff;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.25s;margin-top:24px;box-shadow:0 6px 24px rgba(232,25,44,0.38);border:none;letter-spacing:0.5px;}
.btn:hover:not(:disabled){background:#cc1526;transform:translateY(-2px);box-shadow:0 10px 32px rgba(232,25,44,0.48);}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}

/* Secondary — outlined, subtle */
.btn-secondary{padding:11px 20px;background:transparent;color:#1a1a1a;border:1.5px solid rgba(0,0,0,0.18);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:400;cursor:pointer;transition:all 0.2s;}
.btn-secondary:hover{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.3);}

/* Gold — payment, premium feel */
.btn-gold{padding:14px 28px;background:#c9a227;color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(201,162,39,0.4);letter-spacing:0.3px;}
.btn-gold:hover{background:#b8911f;transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,162,39,0.5);}

/* LinkedIn — brand blue */
.btn-linkedin{padding:12px 22px;background:#0077b5;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(0,119,181,0.3);}
.btn-linkedin:hover{background:#005f94;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,119,181,0.4);}

/* Coach/Chat — warm coral, friendly */
.btn-chat{padding:12px 22px;background:#ff8c32;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(255,140,50,0.3);}
.btn-chat:hover{background:#e87820;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,140,50,0.4);}

/* Ghost — minimal, for reset/back actions */
.btn-ghost{padding:12px 20px;background:transparent;color:rgba(26,26,26,0.45);border:1.5px solid rgba(0,0,0,0.1);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:400;cursor:pointer;transition:all 0.2s;width:100%;margin-top:8px;}
.btn-ghost:hover{border-color:rgba(232,25,44,0.35);color:#e8192c;}

/* Copy — small inline utility */
.btn-copy{padding:7px 14px;background:transparent;color:#ff8c32;border:1px solid rgba(255,140,50,0.35);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:12px;}
.btn-copy:hover{background:rgba(255,140,50,0.07);}

/* Send — chat submit */
.btn-send{padding:12px 20px;background:#e8192c;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;box-shadow:0 3px 10px rgba(232,25,44,0.3);}
.btn-send:hover:not(:disabled){background:#cc1526;transform:translateY(-1px);}
.btn-send:disabled{opacity:0.38;cursor:not-allowed;}

/* Loading */
.loading-wrap{text-align:center;padding:70px 24px;}
.spinner{width:44px;height:44px;border:3px solid rgba(255,140,50,0.2);border-top-color:#ff8c32;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:8px;color:#1a1a1a;}
.loading-sub{color:rgba(26,26,26,0.45);font-size:0.88rem;font-weight:300;}
.loading-steps{display:flex;flex-direction:column;gap:10px;margin-top:28px;max-width:300px;margin-left:auto;margin-right:auto;}
.loading-step{display:flex;align-items:center;gap:10px;font-size:0.82rem;color:rgba(26,26,26,0.3);}
.loading-step.done{color:#ff8c32;}
.step-dot{width:6px;height:6px;border-radius:50%;background:rgba(26,26,26,0.12);flex-shrink:0;}
.loading-step.done .step-dot{background:#ff8c32;}

/* Score */
.score-card{background:linear-gradient(135deg,#fff8ee,#fff3f3);border:1px solid rgba(255,140,50,0.2);border-radius:20px;padding:28px 32px;margin-bottom:16px;box-shadow:0 4px 24px rgba(255,120,40,0.08);}
.score-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.score-left{flex:1;}
.score-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#ff8c32;font-weight:500;margin-bottom:8px;}
.score-num{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:900;line-height:1;}
.score-num.high{color:#16a34a;}
.score-num.mid{color:#ff8c32;}
.score-num.low{color:#ef4444;}
.score-label{font-size:0.8rem;color:rgba(26,26,26,0.4);margin-top:4px;}
.score-verdict{font-size:0.88rem;color:rgba(26,26,26,0.6);line-height:1.55;max-width:300px;}
.score-bar-bg{background:rgba(0,0,0,0.07);border-radius:100px;height:8px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:100px;transition:width 1.2s ease;}
.score-bar-fill.high{background:linear-gradient(90deg,#16a34a,#4ade80);}
.score-bar-fill.mid{background:linear-gradient(90deg,#ff8c32,#ffa94d);}
.score-bar-fill.low{background:linear-gradient(90deg,#ef4444,#f87171);}

/* Results */
.result-section{margin-bottom:16px;}
.section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#ff8c32;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(255,140,50,0.2);}
.keyword-grid{display:flex;flex-wrap:wrap;gap:8px;}
.kw-chip{padding:6px 14px;border-radius:100px;font-size:0.8rem;font-weight:400;}
.kw-found{background:rgba(22,163,74,0.08);border:1px solid rgba(22,163,74,0.22);color:#16a34a;}
.kw-missing{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);color:#ef4444;}
.bullet-item{background:#fffaf5;border:1px solid rgba(255,140,50,0.15);border-radius:14px;padding:18px 20px;margin-bottom:12px;}
.bullet-before{font-size:0.88rem;color:rgba(26,26,26,0.38);line-height:1.6;margin-bottom:10px;text-decoration:line-through;text-decoration-color:rgba(239,68,68,0.4);}
.bullet-arrow{font-size:0.75rem;color:#ff8c32;margin-bottom:8px;letter-spacing:1px;font-weight:500;}
.bullet-after{font-size:0.9rem;color:#1a1a1a;line-height:1.6;font-weight:300;}
.warn-item{display:flex;gap:14px;background:rgba(255,170,0,0.06);border:1px solid rgba(255,170,0,0.2);border-radius:12px;padding:14px 18px;margin-bottom:10px;font-size:0.88rem;line-height:1.6;color:rgba(26,26,26,0.7);}
.warn-icon{color:#f59e0b;flex-shrink:0;}
.result-box{background:#fffaf5;border:1px solid rgba(255,140,50,0.15);border-radius:14px;padding:24px;font-size:0.93rem;line-height:1.85;font-weight:300;color:rgba(26,26,26,0.85);white-space:pre-wrap;}
.error-box{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:14px 18px;color:#ef4444;font-size:0.88rem;margin-top:14px;}
.footer{text-align:center;margin-top:56px;color:rgba(26,26,26,0.25);font-size:0.75rem;letter-spacing:1.5px;}

/* Coach */
.coach-wrap{margin-top:32px;border-top:1px solid rgba(255,140,50,0.15);padding-top:28px;}
.coach-heading{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#ff8c32;font-weight:500;margin-bottom:6px;}
.coach-subheading{font-size:0.82rem;color:rgba(26,26,26,0.45);font-weight:300;margin-bottom:18px;}
.quick-prompts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.quick-prompt{background:#fff;border:1px solid rgba(255,140,50,0.2);border-radius:100px;padding:6px 14px;font-size:0.78rem;color:rgba(26,26,26,0.55);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.quick-prompt:hover{background:rgba(255,140,50,0.06);border-color:#ff8c32;color:#ff8c32;}
.chat-history{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;max-height:420px;overflow-y:auto;}
.chat-bubble{padding:12px 16px;border-radius:14px;font-size:0.88rem;line-height:1.65;font-weight:300;}
.chat-bubble.user{background:linear-gradient(135deg,rgba(255,140,50,0.12),rgba(255,107,107,0.08));border:1px solid rgba(255,140,50,0.2);color:#1a1a1a;align-self:flex-end;max-width:85%;border-radius:14px 14px 4px 14px;}
.chat-bubble.assistant{background:#fff;border:1px solid rgba(0,0,0,0.08);color:rgba(26,26,26,0.85);align-self:flex-start;max-width:95%;border-radius:14px 14px 14px 4px;white-space:pre-wrap;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.chat-bubble.thinking{color:rgba(26,26,26,0.35);font-style:italic;}
.chat-input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;background:#fff;border:1px solid rgba(255,140,50,0.2);border-radius:12px;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:300;line-height:1.5;padding:12px 16px;resize:none;outline:none;transition:border-color 0.2s;min-height:48px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.chat-input:focus{border-color:#ff8c32;}
.chat-input::placeholder{color:rgba(26,26,26,0.28);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

function readFileAsBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});}
function readFileAsText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(file);});}

function DropZone({onFile,file,onClear}){
  const [dragging,setDragging]=useState(false);
  const inputRef=useRef();
  return file?(
    <div className="file-chip">• {file.name}<button onClick={onClear}>✕</button></div>
  ):(
    <div className={`dropzone${dragging?" dragging":""}`}
      onDragOver={e=>{e.preventDefault();setDragging(true);}}
      onDragLeave={()=>setDragging(false)}
      onDrop={e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)onFile(f);}}
      onClick={()=>inputRef.current.click()}>
      <input ref={inputRef} type="file" accept=".pdf,.txt,.doc,.docx" style={{display:"none"}} onChange={e=>e.target.files[0]&&onFile(e.target.files[0])}/>
      <div className="drop-icon">↑</div>
      <div className="drop-title">Drop your resume here or click to browse</div>
      <div className="drop-sub">PDF · TXT · DOC · DOCX</div>
    </div>
  );
}

function ScoreGauge({score}){
  const pct=Math.min(100,Math.max(0,score));
  const cls=pct>=75?"high":pct>=50?"mid":"low";
  const label=pct>=75?"Strong match — likely to pass ATS":pct>=50?"Moderate match — a few tweaks will help":"Weak match — improvements needed";
  return(
    <div className="score-card">
      <div className="score-header">
        <div className="score-left">
          <div className="score-title">ATS Match Score</div>
          <div className={`score-num ${cls}`}>{pct}<span style={{fontSize:"1.4rem",opacity:0.5}}>%</span></div>
          <div className="score-label">keyword match</div>
        </div>
        <div className="score-verdict">{label}</div>
      </div>
      <div className="score-bar-bg"><div className={`score-bar-fill ${cls}`} style={{width:pct+"%"}}/></div>
    </div>
  );
}

function CoachChat({result,setResult}){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [thinking,setThinking]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,thinking]);
  const quickPrompts=["Make the cover letter shorter","Make the tone more confident","Make it less formal","Rewrite the bullets again","Add more leadership focus","Make it more specific to the role"];
  async function send(text){
    const userMsg=text||input.trim();
    if(!userMsg||thinking)return;
    setInput("");
    setMessages(prev=>[...prev,{role:"user",content:userMsg}]);
    setThinking(true);
    try{
      const context=`You are a warm, encouraging career coach helping refine job application materials.\n\nCurrent cover letter:\n${result.coverLetter}\n\nRewritten bullets:\n${(result.rewrittenBullets||[]).map((b,i)=>`Bullet ${i+1}: ${b.improved}`).join("\n")}\n\nMissing keywords: ${(result.missingKeywords||[]).join(", ")}\n\nUser request: "${userMsg}"\n\nBe warm, direct and helpful. If rewriting the cover letter, provide the complete new version starting with "Dear Hiring Manager," ending with "Best regards,\n[Your Name]".`;
      const response=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:context}]})});
      const data=await response.json();
      const reply=data.content?.map(b=>b.text||"").join("")||"Sorry, something went wrong.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
      const clMatch=reply.match(/Dear Hiring Manager[\s\S]+Best regards[\s\S]*?\[Your Name\]/);
      if(clMatch)setResult(prev=>({...prev,coverLetter:clMatch[0]}));
    }catch(e){
      setMessages(prev=>[...prev,{role:"assistant",content:"Something went wrong. Please try again."}]);
    }
    setThinking(false);
  }
  return(
    <div className="coach-wrap">
      <div className="coach-heading">Your AI Career Coach</div>
      <div className="coach-subheading">Happy with the results? Want to tweak anything? Just ask — I am here to help you land this job.</div>
      <div className="quick-prompts">{quickPrompts.map((p,i)=><button key={i} className="quick-prompt" onClick={()=>send(p)} disabled={thinking}>{p}</button>)}</div>
      {messages.length>0&&(
        <div className="chat-history">
          {messages.map((m,i)=><div key={i} className={`chat-bubble ${m.role}`}>{m.content}</div>)}
          {thinking&&<div className="chat-bubble assistant thinking">Thinking...</div>}
          <div ref={bottomRef}/>
        </div>
      )}
      <div className="chat-input-row">
        <textarea className="chat-input" rows={1} placeholder="e.g. Make the cover letter more concise..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} disabled={thinking}/>
        <button className="btn-send" onClick={()=>send()} disabled={!input.trim()||thinking}>{thinking?"...":"Send →"}</button>
      </div>
    </div>
  );
}

const SYSTEM_PROMPT=`You are a senior ATS optimization expert and career coach. Analyze the resume against the job description and return ONLY a valid JSON object (no preamble, no markdown, no backticks):
{"atsScore":<integer 0-100>,"foundKeywords":[<max 12>],"missingKeywords":[<max 10, highest impact first>],"formattingWarnings":[<ATS issues, empty array if none>],"rewrittenBullets":[{"original":"<bullet>","improved":"<rewritten>"}],"coverLetter":"<3-4 paragraphs. Dear Hiring Manager, ... Best regards, [Your Name]>"}
Rules: accurate atsScore, 3 rewritten bullets, specific upbeat cover letter.`;

function App(){
  const [step,setStep]=useState("input");
  const [resumeTab,setResumeTab]=useState("paste");
  const [resume,setResume]=useState("");
  const [resumeFile,setResumeFile]=useState(null);
  const [jobDesc,setJobDesc]=useState("");
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [copied,setCopied]=useState(false);
  const [loadStep,setLoadStep]=useState(0);
  const hasResume=resume.trim().length>80||resumeFile!==null;
  const canSubmit=hasResume&&jobDesc.trim().length>60;

  async function generate(){
    setStep("loading");setLoadStep(0);setError("");
    [400,1400,2600,4200,6000].forEach((d,i)=>setTimeout(()=>setLoadStep(i+1),d));
    try{
      let messages;
      if(resumeFile&&resumeFile.type==="application/pdf"){
        const b64=await readFileAsBase64(resumeFile);
        messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:`Above is my resume. Job description:\n\n${jobDesc}`}]}];
      }else{
        let resumeText=resume;
        if(resumeFile)resumeText=await readFileAsText(resumeFile);
        messages=[{role:"user",content:`RESUME:\n${resumeText}\n\nJOB DESCRIPTION:\n${jobDesc}`}];
      }
      const response=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:SYSTEM_PROMPT,messages})});
      const data=await response.json();
      const text=data.content?.map(b=>b.text||"").join("")||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setResult(parsed);setStep("result");
    }catch(err){
      setError("Something went wrong — please check your inputs and try again.");setStep("input");
    }
  }

  function reset(){setStep("input");setResult(null);setError("");setResume("");setResumeFile(null);setJobDesc("");setLoadStep(0);}
  const loadingSteps=["Reading your resume","Scanning job requirements","Running ATS analysis","Rewriting resume bullets","Crafting your cover letter"];

  return(
    <div>
      <div className="hero">
        <div className="hero-bg"/>
        <div className="hero-overlay"/>
        <div className="hero-content">
          <div className="badge">ATS-Optimized Career Tool</div>
          <h1>Beat the <span>Algorithm.</span><br/>Land the Job.</h1>
          <p className="subtitle">Most resumes never reach a human. We fix that — so you get more callbacks, more interviews, and more offers.</p>
          <div className="price-row">
            <div className="price-tag"><strong>$15</strong>/month · No subscription. No cancel button. Ever.</div>
          </div>
          <div className="feature-pills">
            <span className="feature-pill">✓ ATS Score</span>
            <span className="feature-pill">✓ Keyword Gap</span>
            <span className="feature-pill">✓ Bullet Rewrites</span>
            <span className="feature-pill">✓ Cover Letter</span>
            <span className="feature-pill">✓ AI Coach</span>
          </div>
        </div>
      </div>

      <div className="stats-strip">
        <div className="stats-inner">
          <div className="stat-item">
            <div className="stat-num">75%</div>
            <div className="stat-label">Resumes rejected by ATS</div>
          </div>
          <div className="stat-div"/>
          <div className="stat-item">
            <div className="stat-num">3x</div>
            <div className="stat-label">More callbacks with optimization</div>
          </div>
          <div className="stat-div"/>
          <div className="stat-item">
            <div className="stat-num">Fast</div>
            <div className="stat-label">Results in seconds</div>
          </div>
        </div>
      </div>

      <div className="main-wrap">
        <div className="side-img-left"/>
        <div className="side-img-right"/>
        <div className="main">
          {step==="input"&&(
            <>
              <div className="section-intro">
                <h2>Let's get you hired</h2>
                <p>Paste your resume and the job description below — we'll handle the rest.</p>
              </div>
              <div className="card">
                <div className="card-label">Your Resume</div>
                <div className="tabs">
                  <button className={`tab${resumeTab==="paste"?" active":""}`} onClick={()=>setResumeTab("paste")}>Paste text</button>
                  <button className={`tab${resumeTab==="upload"?" active":""}`} onClick={()=>setResumeTab("upload")}>↑ Upload file</button>
                </div>
                {resumeTab==="paste"
                  ?<textarea rows={10} placeholder="Paste your full resume text here..." value={resume} onChange={e=>{setResume(e.target.value);setResumeFile(null);}}/>
                  :<DropZone file={resumeFile} onFile={f=>{setResumeFile(f);setResume("");}} onClear={()=>setResumeFile(null)}/>}
              </div>
              <div className="card">
                <div className="card-label">Job Description</div>
                <textarea rows={8} placeholder="Paste the full job description — the more detail, the better the ATS analysis..." value={jobDesc} onChange={e=>setJobDesc(e.target.value)}/>
              </div>
              <div style={{height:"8px"}}/>
              <button className="btn" onClick={generate} disabled={!canSubmit}>Run ATS Analysis + Generate Cover Letter →</button>
              {error&&<div className="error-box">{error}</div>}
            </>
          )}

          {step==="loading"&&(
            <div className="loading-wrap">
              <div className="spinner"/>
              <div className="loading-title">Analyzing your application...</div>
              <div className="loading-sub">Running full ATS optimization suite</div>
              <div className="loading-steps">
                {loadingSteps.map((s,i)=>(
                  <div key={i} className={`loading-step${loadStep>i?" done":""}`}>
                    <div className="step-dot"/>{s}
                  </div>
                ))}
              </div>
            </div>
          )}

          {step==="result"&&result&&(
            <>
              <div className="section-intro" style={{marginBottom:"24px"}}>
                <h2>Your results are ready</h2>
                <p>Here is everything you need to land that interview.</p>
              </div>
              <ScoreGauge score={result.atsScore}/>
              <div className="card result-section">
                <div className="section-label">Keyword Match</div>
                <p style={{fontSize:"0.82rem",color:"rgba(26,26,26,0.45)",marginBottom:"12px",fontWeight:300}}>Green = found in your resume · Red = missing (add these to beat ATS)</p>
                <div className="keyword-grid">
                  {(result.foundKeywords||[]).map((k,i)=><span key={i} className="kw-chip kw-found">✓ {k}</span>)}
                  {(result.missingKeywords||[]).map((k,i)=><span key={i} className="kw-chip kw-missing">✗ {k}</span>)}
                </div>
              </div>
              {result.formattingWarnings?.length>0&&(
                <div className="card result-section">
                  <div className="section-label">ATS Formatting Warnings</div>
                  {result.formattingWarnings.map((w,i)=>(
                    <div key={i} className="warn-item"><span className="warn-icon">⚠</span><span>{w}</span></div>
                  ))}
                </div>
              )}
              {result.rewrittenBullets?.length>0&&(
                <div className="card result-section">
                  <div className="section-label">Resume Bullet Rewrites</div>
                  <p style={{fontSize:"0.82rem",color:"rgba(26,26,26,0.4)",marginBottom:"14px",fontWeight:300}}>Your weakest bullets rewritten to include missing keywords</p>
                  {result.rewrittenBullets.map((b,i)=>(
                    <div key={i} className="bullet-item">
                      <div className="bullet-before">{b.original}</div>
                      <div className="bullet-arrow">▼ OPTIMIZED</div>
                      <div className="bullet-after">{b.improved}</div>
                    </div>
                  ))}
                </div>
              )}
              <div className="card result-section">
                <div className="section-label">Tailored Cover Letter</div>
                <div className="result-box">{result.coverLetter}</div>
                <button className="btn-copy" onClick={()=>{navigator.clipboard.writeText(result.coverLetter);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
                  {copied?"✓ Copied!":"Copy to clipboard"}
                </button>
              </div>
              <div className="card">
                <CoachChat result={result} setResult={setResult}/>
              </div>
              <button className="btn-ghost" onClick={reset}>← Analyze a new application</button>
            </>
          )}
          <div className="footer">CAREERAI · BUILT WITH AI · NO CANCEL ANXIETY</div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
