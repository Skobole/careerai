<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const STRIPE_PK = 'pk_test_REPLACE_WITH_YOUR_PUBLISHABLE_KEY';

function readFileAsBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});}
function readFileAsText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(file);});}

function DropZone({onFile,file,onClear}){
  const [dragging,setDragging]=useState(false);
  const inputRef=useRef();
  return file?(
    <div className="file-chip">• {file.name}<button onClick={onClear}>✕</button></div>
  ):(
    <div className={`dropzone${dragging?" dragging":""}`}
      onDragOver={e=>{e.preventDefault();setDragging(true);}}
      onDragLeave={()=>setDragging(false)}
      onDrop={e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)onFile(f);}}
      onClick={()=>inputRef.current.click()}>
      <input ref={inputRef} type="file" accept=".pdf,.txt,.doc,.docx" style={{display:"none"}} onChange={e=>e.target.files[0]&&onFile(e.target.files[0])}/>
      <div className="drop-icon">↑</div>
      <div className="drop-title">Drop your resume here or click to browse</div>
      <div className="drop-sub">PDF · TXT · DOC · DOCX</div>
    </div>
  );
}

function ScoreGauge({score}){
  const pct=Math.min(100,Math.max(0,score));
  const cls=pct>=75?"high":pct>=50?"mid":"low";
  const label=pct>=75?"Strong match — likely to pass ATS":pct>=50?"Moderate match — a few tweaks will help":"Weak match — improvements needed";
  return(
    <div className="score-card">
      <div className="score-header">
        <div className="score-left">
          <div className="score-title">ATS Match Score</div>
          <div className={`score-num ${cls}`}>{pct}<span style={{fontSize:"1.4rem",opacity:0.5}}>%</span></div>
          <div className="score-label">keyword match</div>
        </div>
        <div className="score-verdict">{label}</div>
      </div>
      <div className="score-bar-bg"><div className={`score-bar-fill ${cls}`} style={{width:pct+"%"}}/></div>
    </div>
  );
}

function CoachChat({result,setResult}){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [thinking,setThinking]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,thinking]);
  const quickPrompts=["Make the cover letter shorter","Make the tone more confident","Make it less formal","Rewrite the bullets again","Add more leadership focus","Make it more specific to the role"];
  async function send(text){
    const userMsg=text||input.trim();
    if(!userMsg||thinking)return;
    setInput("");
    setMessages(prev=>[...prev,{role:"user",content:userMsg}]);
    setThinking(true);
    try{
      const context=`You are a warm, encouraging career coach helping refine job application materials.\n\nCurrent cover letter:\n${result.coverLetter}\n\nRewritten bullets:\n${(result.rewrittenBullets||[]).map((b,i)=>`Bullet ${i+1}: ${b.improved}`).join("\n")}\n\nMissing keywords: ${(result.missingKeywords||[]).join(", ")}\n\nUser request: "${userMsg}"\n\nBe warm, direct and helpful. If rewriting the cover letter, provide the complete new version starting with "Dear Hiring Manager," ending with "Best regards,\n[Your Name]".`;
      const response=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2000,messages:[{role:"user",content:context}]})});
      const data=await response.json();
      const reply=data.content?.map(b=>b.text||"").join("")||"Sorry, something went wrong.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
      const clMatch=reply.match(/Dear Hiring Manager[\s\S]+Best regards[\s\S]*?\[Your Name\]/);
      if(clMatch)setResult(prev=>({...prev,coverLetter:clMatch[0]}));
    }catch(e){
      setMessages(prev=>[...prev,{role:"assistant",content:"Something went wrong. Please try again."}]);
    }
    setThinking(false);
  }
  return(
    <div className="coach-wrap">
      <div className="coach-heading">Your AI Career Coach</div>
      <div className="coach-subheading">Happy with the results? Want to tweak anything? Just ask.</div>
      <div className="quick-prompts">{quickPrompts.map((p,i)=><button key={i} className="quick-prompt" onClick={()=>send(p)} disabled={thinking}>{p}</button>)}</div>
      {messages.length>0&&(
        <div className="chat-history">
          {messages.map((m,i)=><div key={i} className={`chat-bubble ${m.role}`}>{m.content}</div>)}
          {thinking&&<div className="chat-bubble assistant thinking">Thinking...</div>}
          <div ref={bottomRef}/>
        </div>
      )}
      <div className="chat-input-row">
        <textarea className="chat-input" rows={1} placeholder="e.g. Make the cover letter more concise..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} disabled={thinking}/>
        <button className="btn-send" onClick={()=>send()} disabled={!input.trim()||thinking}>{thinking?"...":"Send →"}</button>
      </div>
    </div>
  );
}

function PaymentModal({onSuccess,onClose}){
  const stripeRef=useRef(null);
  const elementsRef=useRef(null);
  const [loading,setLoading]=useState(true);
  const [paying,setPaying]=useState(false);
  const [error,setError]=useState("");
  const [success,setSuccess]=useState(false);

  useEffect(()=>{
    const s=Stripe('pk_test_51TaFgUPSyjNFSSyw0JrJQSNR9OhMSsJ6vu6YYdiZSjME2RYW0AfNvXeKZ7dP64B6wXRWaEUQcz2mOoW5aEymurzm00hWxv69jy');
    stripeRef.current=s;
    fetch("/api/stripe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"create_payment_intent"})})
      .then(r=>r.json())
      .then(data=>{
        if(data.clientSecret){
          const els=s.elements({clientSecret:data.clientSecret,appearance:{theme:"stripe",variables:{colorPrimary:"#ff8c32",borderRadius:"10px"}}});
          elementsRef.current=els;
          const pe=els.create("payment");
          pe.mount("#payment-element");
          pe.on("ready",()=>setLoading(false));
        }
      })
      .catch(()=>{setError("Could not load payment form. Please try again.");setLoading(false);});
  },[]);

  async function handlePay(){
    if(!stripeRef.current||!elementsRef.current)return;
    setPaying(true);setError("");
    try{
      const {error:stripeError,paymentIntent}=await stripeRef.current.confirmPayment({
        elements:elementsRef.current,
        confirmParams:{return_url:window.location.origin},
        redirect:"if_required"
      });
      if(stripeError){
        setError(stripeError.message);
        setPaying(false);
      }else if(paymentIntent&&paymentIntent.status==="succeeded"){
        setSuccess(true);
        setTimeout(()=>onSuccess(),1500);
      }else{
        setError("Payment was not completed. Please try again.");
        setPaying(false);
      }
    }catch(e){
      setError("Payment failed: "+e.message);
      setPaying(false);
    }
  }

  return(
    <div className="payment-overlay">
      <div className="payment-modal">
        {success?(
          <div className="payment-success">
            <div className="payment-success-icon">✓</div>
            <div className="payment-success-title">Payment successful!</div>
            <div className="payment-success-sub">Running your ATS analysis now...</div>
          </div>
        ):(
          <>
            <div className="payment-title">Get Your Results</div>
            <div className="payment-sub">One payment unlocks unlimited analyses and AI coaching for the entire month. No subscription ever.</div>
            <div className="payment-features">
              {["ATS Match Score","Keyword Gap Analysis","Resume Bullet Rewrites","Tailored Cover Letter","AI Career Coach — unlimited revisions","Word + PDF Export"].map((f,i)=>(
                <div key={i} className="payment-feature">
                  <div className="payment-feature-icon">✓</div>
                  {f}
                </div>
              ))}
            </div>
            <div className="payment-price">
              <div className="payment-amount">$15</div>
              <div className="payment-period">/month · one-time · no subscription · no cancel button</div>
            </div>
            {loading&&<div style={{textAlign:"center",padding:"20px",color:"#aaa"}}>Loading payment form...</div>}
            <div id="payment-element"/>
            {error&&<div className="payment-error">{error}</div>}
            <button className="btn" onClick={handlePay} disabled={paying||loading} style={{marginTop:"16px"}}>
              {paying?"Processing...":loading?"Please wait...":"Pay $15 — Get Results →"}
            </button>
            <button className="btn-ghost" onClick={onClose} style={{marginTop:"8px"}}>Cancel</button>
            <div className="payment-note" style={{textAlign:"center",marginTop:"12px"}}>Secured by Stripe · Apple Pay & Google Pay supported</div>
          </>
        )}
      </div>
    </div>
  );
}

const SYSTEM_PROMPT=`You are a senior ATS optimization expert and career coach. Analyze the resume against the job description.

Return ONLY a valid JSON object (no preamble, no markdown, no backticks) with this exact structure:
{
  "atsScore": <integer 0-100>,
  "foundKeywords": [<max 12 keywords found in both>],
  "missingKeywords": [<max 10 keywords missing, highest impact first>],
  "formattingWarnings": [<ATS issues, empty array if none>],
  "rewrittenBullets": [{"original":"<exact bullet from resume>","improved":"<rewritten with keywords>"}],
  "coverLetter": "<3-4 paragraphs. Dear Hiring Manager, ... Best regards, [Your Name]>",
  "resumeData": {
    "name": "<candidate full name>",
    "contact": "<city, phone, email on one line>",
    "summary": "<professional summary paragraph>",
    "industry": "<industry type>",
    "sections": [
      {
        "title": "<section name>",
        "subtitle": "<job title and company and dates if applicable, else null>",
        "body": "<non-bullet body text if any, else null>",
        "bullets": ["<bullet 1>","<bullet 2>"]
      }
    ]
  }
}
Rules: accurate atsScore, 3 rewritten bullets applied in resumeData, specific cover letter. CRITICAL: In resumeData, NEVER change the candidates name, contact details, job titles, company names, or dates — copy them exactly as they appear in the original resume. Only rewrite bullet points.`;

function App(){
  const [step,setStep]=useState("input");
  const [resumeTab,setResumeTab]=useState("paste");
  const [resume,setResume]=useState("");
  const [resumeFile,setResumeFile]=useState(null);
  const [jobDesc,setJobDesc]=useState("");
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [copied,setCopied]=useState(false);
  const [copiedResume,setCopiedResume]=useState(false);
  const [loadStep,setLoadStep]=useState(0);
  const [exporting,setExporting]=useState(false);
  const [paid,setPaid]=useState(false);
  const [showPayment,setShowPayment]=useState(false);



  const hasResume=resume.trim().length>80||resumeFile!==null;
  const canSubmit=hasResume&&jobDesc.trim().length>60;

  function handleAnalyzeClick(){
    if(resumeFile){
      if(resumeFile.size > 512000){
        setError("Your file is too large (max 500KB). A typical resume PDF is under 200KB. Please compress your file or paste the text instead.");
        return;
      }
    }
    if(resume && resume.length > 30000){
      setError("Your resume text is too long. Please shorten it.");
      return;
    }
    if(jobDesc.length > 15000){
      setError("The job description is too long. Please shorten it to the key requirements.");
      return;
    }
    if(!paid){
      setShowPayment(true);
    }else{
      generate();
    }
  }

  function handlePaymentSuccess(){
    setShowPayment(false);
    setPaid(true);
    generate();
  }

  async function generate(){
    setStep("loading");setLoadStep(0);setError("");
    [400,1400,2600,4200,6000].forEach((d,i)=>setTimeout(()=>setLoadStep(i+1),d));
    try{
      let messages;
      if(resumeFile&&resumeFile.type==="application/pdf"){
        // Extract text from PDF in browser using pdf.js
        const arrayBuffer=await resumeFile.arrayBuffer();
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
        let extractedText="";
        for(let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          extractedText+=content.items.map(item=>item.str).join(" ")+"\n";
        }
        messages=[{role:"user",content:`RESUME:\n${extractedText}\n\nJOB DESCRIPTION:\n${jobDesc}`}];
      }else{
        let resumeText=resume;
        if(resumeFile)resumeText=await readFileAsText(resumeFile);
        messages=[{role:"user",content:`RESUME:\n${resumeText}\n\nJOB DESCRIPTION:\n${jobDesc}`}];
      }
      const response=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:4000,system:SYSTEM_PROMPT,messages})});
      const data=await response.json();
      if(data.error)throw new Error(typeof data.error==="string"?data.error:JSON.stringify(data.error));
      const text=data.content?.map(b=>b.text||"").join("")||"";
      if(!text)throw new Error("Empty response from AI");
      const jsonMatch=text.match(/\{[\s\S]*\}/);
      if(!jsonMatch)throw new Error("Could not parse AI response");
      const parsed=JSON.parse(jsonMatch[0]);
      setResult(parsed);setStep("result");
    }catch(err){
      setError("Something went wrong: "+err.message);setStep("input");
    }
  }

  async function exportWord(){
    if(!result?.resumeData)return;
    setExporting(true);
    try{
      const response=await fetch("/api/export",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({resumeData:result.resumeData})});
      const blob=await response.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download="optimized-resume.doc";a.click();
      URL.revokeObjectURL(url);
    }catch(e){alert("Export failed. Please try again.");}
    setExporting(false);
  }

  async function exportPDF(){
    if(!result?.resumeData)return;
    const d=result.resumeData;
    let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>@page{size:8.5in 11in;margin:0.75in 0.9in;margin-header:0;margin-footer:0;}body{font-family:Arial,sans-serif;font-size:10.5pt;color:#1a1a1a;line-height:1.4;max-width:700px;margin:0 auto;}.name{font-size:18pt;font-weight:bold;text-align:center;margin-bottom:2pt;letter-spacing:1px;}.contact{font-size:9.5pt;text-align:center;color:#444;margin-bottom:10pt;}.section-header{font-size:10.5pt;font-weight:bold;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1.5px solid #1a1a1a;margin-top:10pt;margin-bottom:4pt;padding-bottom:2pt;}.subtitle{font-size:10pt;font-weight:bold;margin-bottom:2pt;}.body{font-size:10pt;margin-bottom:4pt;}ul{margin:2pt 0 4pt 0;padding-left:16pt;}li{font-size:10pt;margin-bottom:2pt;}@media print{body{margin:0;}@page{margin:0.75in 0.9in;size:8.5in 11in;}html{-webkit-print-color-adjust:exact;}head,footer{display:none!important;}}</style></head><body>`;
    html+=`<p class="name">${d.name}</p><p class="contact">${d.contact}</p>`;
    if(d.summary)html+=`<p class="section-header">Professional Summary</p><p class="body">${d.summary}</p>`;
    (d.sections||[]).forEach(s=>{
      html+=`<p class="section-header">${s.title}</p>`;
      if(s.subtitle)html+=`<p class="subtitle">${s.subtitle}</p>`;
      if(s.body)html+=`<p class="body">${s.body}</p>`;
      if(s.bullets&&s.bullets.length){html+=`<ul>`;s.bullets.forEach(b=>{html+=`<li>${b}</li>`;});html+=`</ul>`;}
    });
    html+=`</body></html>`;
    const win=window.open("","_blank");
    win.document.write(html);win.document.close();win.focus();
    setTimeout(()=>win.print(),600);
  }

  function getOptimizedText(){
    if(!result?.resumeData)return "";
    const d=result.resumeData;
    let text=`${d.name}\n${d.contact}\n\n`;
    if(d.summary)text+=`PROFESSIONAL SUMMARY\n${d.summary}\n\n`;
    (d.sections||[]).forEach(s=>{
      text+=`${s.title.toUpperCase()}\n`;
      if(s.subtitle)text+=`${s.subtitle}\n`;
      if(s.body)text+=`${s.body}\n`;
      if(s.bullets)s.bullets.forEach(b=>{text+=`• ${b}\n`;});
      text+="\n";
    });
    return text;
  }

  function reset(){setStep("input");setResult(null);setError("");setResume("");setResumeFile(null);setJobDesc("");setLoadStep(0);setPaid(false);}
  const loadingSteps=["Reading your resume","Scanning job requirements","Running ATS analysis","Rewriting resume bullets","Crafting your cover letter"];

  return(
    <div>
      {showPayment&&<PaymentModal onSuccess={handlePaymentSuccess} onClose={()=>setShowPayment(false)}/>}

      <div className="hero">
        <div className="hero-bg"/><div className="hero-overlay"/>
        <div className="hero-content">
          <div className="badge">ATS-Optimized Career Tool</div>
          <h1>Beat the <span>Algorithm.</span><br/>Land the Job.</h1>
          <p className="subtitle-text">Most resumes never reach a human. We fix that — with ATS optimization, AI interview prep with daily updated questions, job recommendations, and agents working for you 24/7.</p>
          <div className="price-row">
            <div className="price-tag"><strong>$15</strong>/month · No subscription. No cancel button. Ever.</div>
          </div>
          <div className="feature-pills">
            <span className="feature-pill">✓ ATS Score</span>
            <span className="feature-pill">✓ Keyword Gap</span>
            <span className="feature-pill">✓ Bullet Rewrites</span>
            <span className="feature-pill">✓ Cover Letter</span>
            <span className="feature-pill">✓ AI Coach</span>
            <span className="feature-pill">✓ Resume Export</span>
            <span className="feature-pill">✓ Interview Prep</span>
            <span className="feature-pill">✓ Job Agent</span>
          </div>
        </div>
      </div>

      <div className="stats-strip">
        <div className="stats-inner">
          <div className="stat-item"><div className="stat-num">75%</div><div className="stat-label">Resumes rejected by ATS</div></div>
          <div className="stat-div"/>
          <div className="stat-item"><div className="stat-num">3x</div><div className="stat-label">More callbacks with optimization</div></div>
          <div className="stat-div"/>
          <div className="stat-item"><div className="stat-num">Fast</div><div className="stat-label">Results in seconds</div></div>
        </div>
      </div>

      <div className="main-wrap">
        <div className="side-img-left"/><div className="side-img-right"/>
        <div className="main">
          {step==="input"&&(
            <>
              <div className="section-intro">
                <h2>Let's get you hired</h2>
                <p>Paste your resume and the job description below — we will handle the rest.</p>
              </div>
              <div className="card">
                <div className="card-label">Your Resume</div>
                <div className="tabs">
                  <button className={`tab${resumeTab==="paste"?" active":""}`} onClick={()=>setResumeTab("paste")}>Paste text</button>
                  <button className={`tab${resumeTab==="upload"?" active":""}`} onClick={()=>setResumeTab("upload")}>↑ Upload file</button>
                </div>
                {resumeTab==="paste"
                  ?<textarea rows={10} placeholder="Paste your full resume text here..." value={resume} onChange={e=>{setResume(e.target.value);setResumeFile(null);}}/>
                  :<DropZone file={resumeFile} onFile={f=>{setResumeFile(f);setResume("");}} onClear={()=>setResumeFile(null)}/>}
              </div>
              <div className="card">
                <div className="card-label">Job Description</div>
                <textarea rows={8} placeholder="Paste the full job description — the more detail, the better the ATS analysis..." value={jobDesc} onChange={e=>setJobDesc(e.target.value)}/>
              </div>
              <div style={{height:"8px"}}/>
              <button className="btn" onClick={handleAnalyzeClick} disabled={!canSubmit}>
                Run ATS Analysis + Generate Cover Letter →
              </button>
              {error&&<div className="error-box">{error}</div>}
            </>
          )}

          {step==="loading"&&(
            <div className="loading-wrap">
              <div className="spinner"/>
              <div className="loading-title">Analyzing your application...</div>
              <div className="loading-sub">Running full ATS optimization suite</div>
              <div className="loading-steps">
                {loadingSteps.map((s,i)=>(
                  <div key={i} className={`loading-step${loadStep>i?" done":""}`}>
                    <div className="step-dot"/>{s}
                  </div>
                ))}
              </div>
            </div>
          )}

          {step==="result"&&result&&(
            <>
              <div className="section-intro" style={{marginBottom:"24px"}}>
                <h2>Your results are ready</h2>
                <p>Here is everything you need to land that interview.</p>
              </div>
              <ScoreGauge score={result.atsScore}/>
              <div className="card result-section">
                <div className="section-label">Keyword Match</div>
                <p style={{fontSize:"0.82rem",color:"rgba(26,26,26,0.45)",marginBottom:"12px",fontWeight:300}}>Green = found in your resume · Red = missing (add these to beat ATS)</p>
                <div className="keyword-grid">
                  {(result.foundKeywords||[]).map((k,i)=><span key={i} className="kw-chip kw-found">✓ {k}</span>)}
                  {(result.missingKeywords||[]).map((k,i)=><span key={i} className="kw-chip kw-missing">✗ {k}</span>)}
                </div>
              </div>
              {result.formattingWarnings?.length>0&&(
                <div className="card result-section">
                  <div className="section-label">ATS Formatting Warnings</div>
                  {result.formattingWarnings.map((w,i)=>(
                    <div key={i} className="warn-item"><span className="warn-icon">⚠</span><span>{w}</span></div>
                  ))}
                </div>
              )}
              {result.rewrittenBullets?.length>0&&(
                <div className="card result-section">
                  <div className="section-label">Resume Bullet Rewrites</div>
                  <p style={{fontSize:"0.82rem",color:"rgba(26,26,26,0.4)",marginBottom:"14px",fontWeight:300}}>Your weakest bullets rewritten to include missing keywords</p>
                  {result.rewrittenBullets.map((b,i)=>(
                    <div key={i} className="bullet-item">
                      <div className="bullet-before">{b.original}</div>
                      <div className="bullet-arrow">▼ OPTIMIZED</div>
                      <div className="bullet-after">{b.improved}</div>
                    </div>
                  ))}
                </div>
              )}
              <div className="card result-section">
                <div className="section-label">Tailored Cover Letter</div>
                <div className="result-box">{result.coverLetter}</div>
                <button className="btn-copy" onClick={()=>{navigator.clipboard.writeText(result.coverLetter);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
                  {copied?"✓ Copied!":"Copy to clipboard"}
                </button>
              </div>
              <div className="card result-section">
                <div className="section-label">Optimized Resume</div>
                <p style={{fontSize:"0.82rem",color:"rgba(26,26,26,0.4)",marginBottom:"14px",fontWeight:300}}>Your complete resume rebuilt with optimized bullets — ready to export.</p>
                <div className="result-box" style={{maxHeight:"360px",overflowY:"auto",fontFamily:"Arial,sans-serif",fontSize:"0.88rem"}}>
                  {result.resumeData?getOptimizedText():"Resume data not available."}
                </div>
                <div className="export-row">
                  <button className="btn-copy" onClick={()=>{navigator.clipboard.writeText(getOptimizedText());setCopiedResume(true);setTimeout(()=>setCopiedResume(false),2000);}}>
                    {copiedResume?"✓ Copied!":"Copy text"}
                  </button>
                  <button className="btn-export word" onClick={exportWord} disabled={exporting||!result.resumeData}>
                    {exporting?"Generating...":"↓ Download Word"}
                  </button>
                  <button className="btn-export pdf" onClick={exportPDF} disabled={!result.resumeData}>
                    ↓ Download PDF
                  </button>
                </div>
                <p className="export-note">Word doc opens in Microsoft Word, Google Docs, or Pages.</p>
                <p className="export-note" style={{marginTop:"6px",color:"#ff8c32",fontWeight:"500"}}>PDF tip: When the print dialog opens — uncheck "Headers and Footers" to remove the URL and timestamp before saving.</p>
              </div>
              <div className="card">
                <CoachChat result={result} setResult={setResult}/>
              </div>
              <button className="btn-ghost" onClick={reset}>← Analyze a new application</button>
            </>
          )}
          <div className="footer">CAREERAI · BUILT WITH AI · NO CANCEL ANXIETY</div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
